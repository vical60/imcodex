# Runtime is selected at startup, not in YAML.
# Default:
#   ./imcodex -config /srv/imcodex/imcodex.yaml
# Explicit Docker runtime:
#   ./imcodex -config /srv/imcodex/imcodex.yaml --runtime docker-codex
# Explicit host runtime:
#   ./imcodex -config /srv/imcodex/imcodex.yaml --runtime host-codex
# Optional Docker Codex config dir override:
#   ./imcodex -config /srv/imcodex/imcodex.yaml --codex-config-dir ~/.codex

# Platform defaults to lark when omitted.
platform: lark

# Lark / Feishu
# Use https://open.feishu.cn for Feishu China tenants.
lark_app_id: cli_xxx
lark_app_secret: your_app_secret
lark_base_url: https://open.larksuite.com

# Telegram
# platform: telegram
# telegram_bot_token: 123456:ABCDEF
# telegram_base_url: https://api.telegram.org

interrupt_on_new_message: true

# Each job must set exactly one of `prompt_file` or `command`.
# `artifacts_dir` and `summary_file` apply only to `command` jobs.
groups:
  - group_id: oc_xxx_primary
    cwd: /srv/my-project
    # Optional local session name override:
    # session_name: imcodex-my-project
    jobs:
      - name: hourly_review
        schedule: "1 * * * *"
        prompt_file: ./prompts/hourly_review.md
        # Optional local prompt_file session name override:
        # session_name: imcodex-job-my-project-hourly-review
      - name: hl_stack_cycle
        schedule: "6 * * * *"
        # Optional:
        # artifacts_dir: ./.imcodex/jobs/hl_stack_cycle
        # summary_file: ./.imcodex/jobs/hl_stack_cycle/latest-summary.md
        command: |
          ./ops/run_dry_cycle.sh &&
          printf 'hl_stack dry cycle completed.\nartifacts: %s\n' "$IMCODEX_JOB_ARTIFACTS_DIR" > "$IMCODEX_JOB_SUMMARY_FILE"

  - group_id: oc_xxx_secondary
    cwd: ~/another-project
